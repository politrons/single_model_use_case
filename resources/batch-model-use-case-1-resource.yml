common_permissions: &permissions
  permissions:
    - level: CAN_MANAGE
      group_name: users

resources:
  jobs:
    model_use_case_1-batch-job:
      name: ${bundle.target}-${bundle.name}-model_use_case_1-batch-job
      # job_clusters:
      #   - job_cluster_key: Job_cluster
      #     new_cluster:
      #       spark_version: 16.4.x-scala2.12
      #       data_security_mode: SINGLE_USER
      #       runtime_engine: STANDARD
      #       num_workers: 1

      tasks:
        - task_key: Batch
          # job_cluster_key: Job_cluster
          existing_cluster_id: 0327-102951-8jsry10r
          libraries:
            - pypi:
                package: mlflow==3.0.1
            - pypi:
                package: pandas==2.3.3
            - pypi:
                package: PyYAML
          spark_python_task:
            python_file: "${var.workspace_name}/${bundle.name}/${bundle.target}/files/src/batch/batch_model.py"
            source: WORKSPACE
            parameters:
              - "--env"
              - "${bundle.target}"
              - "--catalog_name"
              - "${var.catalog_name}"
              - "--model_name"
              - "model_use_case_1"
              - "--experiment_name"
              - "/Users/${workspace.current_user.userName}/${bundle.target}-model_use_case_1_exp"
              - "--model_alias"
              - "champion"
              - "--training_data_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/training_data_config.yml"
              - "--split_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/split_config.yml"
              - "--output_table"
              - "${var.catalog_name}.${bundle.name}.model_use_case_1_batch_predictions"
      <<: *permissions
