common_permissions: &permissions
  permissions:
    - level: CAN_MANAGE
      group_name: users

resources:
  jobs:
    model_use_case_1-factory-job:
      name: ${bundle.target}-${bundle.name}-model_use_case_1-factory-job
      # --- Serverless: define a single environment and reference it from each non-notebook task ---
      environments:
        - environment_key: serverless_default
          spec:
            environment_version: "4"
            dependencies:
              - "imbalanced-learn==0.14.0"
              - "lightgbm==4.3.0"
              - "mlflow==3.0.1"
              - "neuralprophet==0.8.0"
              - "numpy==1.26.4"
              - "optuna==3.6.0"
              - "optuna-integration==3.6.0"
              - "pandas==2.3.3"
              - "ray[all]"
              - "scikit-learn==1.6.1"
              - "scipy==1.16.3"
              - "torch==2.5.1"
              - "tensorflow==2.17.0"
              - "xgboost==2.1.4"
              - "pyspark"
              - "PyYAML"
              - "pytz~=2022.2.1"
              - "databricks-sdk>=0.57"
              - "databricks-feature-engineering==0.12.1"
              - "azure-keyvault==4.2.0"
              - "shap==0.46.0"

      tasks:
        - task_key: Training
          environment_key: serverless_default
          spark_python_task:
            python_file: "${var.workspace_name}/${bundle.name}/${bundle.target}/files/src/training/train_model.py"
            source: WORKSPACE
            parameters:
              - "--env"
              - "${bundle.target}"
              - "--experiment_name"
              - "/Users/${workspace.current_user.userName}/${bundle.target}-model_use_case_1_exp"
              - "--model_name"
              - "${var.catalog_name}.${bundle.name}.model_use_case_1"
              - "--catalog_name"
              - "${var.catalog_name}"
              - "--training_data_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/training_data_config.yml"
              - "--model_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/model_config.yml"
              - "--split_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/split_config.yml"
              - "--metrics_latency_table"
              - "${var.catalog_name}.${bundle.name}.model_use_case_1_metrics"
              - "--validation_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/validation_config.yml"
              - "--baseline_table_name"
              - "${var.catalog_name}.${bundle.name}.model_use_case_1_baseline"
        - task_key: Validation
          environment_key: serverless_default
          depends_on:
            - task_key: Training
          spark_python_task:
            python_file: "${var.workspace_name}/${bundle.name}/${bundle.target}/files/src/validation/validate_model.py"
            source: WORKSPACE
            parameters:
              - "--env"
              - "${bundle.target}"
              - "--dependency_task_key"
              - "Training"
              - "--catalog_name"
              - "${var.catalog_name}"
              - "--model_name"
              - "${var.catalog_name}.${bundle.name}.model_use_case_1"
              - "--experiment_name"
              - "/Users/${workspace.current_user.userName}/${bundle.target}-model_use_case_1_exp"
              - "--training_data_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/training_data_config.yml"
              - "--model_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/model_config.yml"
              - "--validation_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/validation_config.yml"
              - "--eval_result_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/eval_result_config.yml"
              - "--split_config"
              - "${var.workspace_name}/${bundle.name}/${bundle.target}/files/configs/model_use_case_1/split_config.yml"
              - "--metrics_table"
              - "${var.catalog_name}.${bundle.name}.model_use_case_1_metrics"
        - task_key: Deployment
          environment_key: serverless_default
          depends_on:
            - task_key: Validation
          spark_python_task:
            python_file: "${var.workspace_name}/${bundle.name}/${bundle.target}/files/src/deployment/deploy_model.py"
            source: WORKSPACE
            parameters:
              - "--env"
              - "${bundle.target}"
#      schedule:
#        quartz_cron_expression: ${cron_job}
#        timezone_id: UTC
#        pause_status: ${pause_status}
      <<: *permissions
